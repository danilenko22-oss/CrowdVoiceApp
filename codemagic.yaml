workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 30

    environment:
      vars:
        PACKAGE_NAME: "com.example.crowdvoiceapp"

    scripts:
      - name: Get dependencies
        script: |
          flutter pub get

      - name: Build APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk